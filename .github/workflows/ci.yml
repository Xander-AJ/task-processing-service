name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    # Wired to the defaults in app/config.py Settings (DATABASE_URL /
    # TEST_DATABASE_URL). The test DB (tasks_test) is created by the test harness.
    env:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/tasks
      TEST_DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/tasks_test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tasks
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type-check (mypy)
        run: mypy

      - name: Apply migrations
        run: alembic upgrade head

      - name: Check for schema drift
        # Fails if a model changed without a matching migration.
        run: alembic check

      - name: Run tests
        run: pytest -v
