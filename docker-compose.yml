services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tasks
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10

  # One-shot migration step. api and worker both wait for this to finish so
  # neither starts against an empty schema, and migrations run exactly once.
  migrate:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/tasks
    depends_on:
      db:
        condition: service_healthy
    command: alembic upgrade head

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/tasks
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/tasks
      WORKER_ID: worker-1
    # Each worker replica exposes its own metrics on 9100 and is a separate
    # Prometheus scrape target: counters are per-process and summed by Prometheus
    # across targets. (No Prometheus service here — instrumentation only.)
    ports:
      - "9100:9100"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: python -m app.worker

volumes:
  pgdata:
